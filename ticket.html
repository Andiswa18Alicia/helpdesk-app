<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket — HelpDesk Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase MUST load before app.js -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>

<style>
:root {
  --accent:#0ea5e9;--accent-dim:rgba(14,165,233,0.12);--accent-glow:rgba(14,165,233,0.25);
  --low:#22c55e;--medium:#f59e0b;--high:#f97316;--critical:#ef4444;
  --open:#0ea5e9;--inprogress:#a855f7;--resolved:#22c55e;
  --radius:10px;--font-ui:'Bricolage Grotesque',sans-serif;--font-mono:'Fira Code',monospace;--transition:0.2s ease;
}
[data-theme="light"]{--bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;--border:#dde3ec;--text:#1a202c;--text2:#4a5568;--muted:#8a96a8;--shadow:0 1px 4px rgba(0,0,0,0.08),0 4px 16px rgba(0,0,0,0.05)}
[data-theme="dark"] {--bg:#0c0e14;--surface:#13151f;--surface2:#1a1d2a;--border:#252836;--text:#e8eaf2;--text2:#9099b0;--muted:#555e72;--shadow:0 1px 4px rgba(0,0,0,0.4),0 4px 16px rgba(0,0,0,0.3)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;line-height:1.6;min-height:100vh;transition:background var(--transition),color var(--transition)}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:16px}
.topbar-left{display:flex;align-items:center;gap:14px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:7px;border:1px solid var(--border);transition:all var(--transition)}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.logo-small{font-size:15px;font-weight:800;letter-spacing:-0.02em}.logo-small span{color:var(--accent)}
.topbar-actions{display:flex;align-items:center;gap:10px}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--low);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--low);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.page{max-width:1100px;margin:0 auto;padding:28px;display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
.ticket-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.ticket-id-badge{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;margin-bottom:8px;display:inline-block}
.ticket-main-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;line-height:1.3}
.ticket-desc-text{color:var(--text2);font-size:14px;line-height:1.7;margin-top:14px;white-space:pre-wrap}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-priority-low{background:rgba(34,197,94,0.12);color:var(--low);border:1px solid rgba(34,197,94,0.25)}
.pill-priority-medium{background:rgba(245,158,11,0.12);color:var(--medium);border:1px solid rgba(245,158,11,0.25)}
.pill-priority-high{background:rgba(249,115,22,0.12);color:var(--high);border:1px solid rgba(249,115,22,0.25)}
.pill-priority-critical{background:rgba(239,68,68,0.12);color:var(--critical);border:1px solid rgba(239,68,68,0.25)}
.pill-status-open{background:rgba(14,165,233,0.12);color:var(--open);border:1px solid rgba(14,165,233,0.25)}
.pill-status-inprogress{background:rgba(168,85,247,0.12);color:var(--inprogress);border:1px solid rgba(168,85,247,0.25)}
.pill-status-resolved{background:rgba(34,197,94,0.12);color:var(--resolved);border:1px solid rgba(34,197,94,0.25)}
.attachment-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.attachment-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;transition:all var(--transition);text-decoration:none;color:var(--text2)}
.attachment-chip:hover{border-color:var(--accent);color:var(--accent)}
.comments-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.section-title{font-size:15px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.comment{display:flex;gap:12px;margin-bottom:20px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.comment-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;background:var(--accent)}
.comment.internal .comment-avatar{background:var(--inprogress)}
.comment-body{flex:1;min-width:0}
.comment-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.comment-author{font-weight:700;font-size:13px}.comment-time{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.comment-type-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.badge-internal{background:rgba(168,85,247,0.12);color:var(--inprogress);border:1px solid rgba(168,85,247,0.25)}
.badge-public{background:rgba(14,165,233,0.12);color:var(--open);border:1px solid rgba(14,165,233,0.25)}
.comment-text{font-size:13px;color:var(--text2);line-height:1.7;background:var(--surface2);border-radius:0 8px 8px 8px;padding:10px 14px;border:1px solid var(--border)}
.comment.internal .comment-text{border-left:2px solid var(--inprogress)}
.mention{color:var(--accent);font-weight:600}
.composer{margin-top:24px;border-top:1px solid var(--border);padding-top:20px}
.composer-tabs{display:flex;gap:4px;margin-bottom:12px}
.composer-tab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all var(--transition)}
.composer-tab:hover{border-color:var(--accent);color:var(--accent)}
.composer-tab.active-public{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.composer-tab.active-internal{background:rgba(168,85,247,0.1);border-color:var(--inprogress);color:var(--inprogress)}
.composer-name-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.composer-input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-ui);font-size:13px;padding:8px 12px;outline:none;transition:border-color var(--transition);width:100%}
.composer-input:focus{border-color:var(--accent)}.composer-input::placeholder{color:var(--muted)}
.composer-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-ui);font-size:13px;padding:12px 14px;outline:none;resize:vertical;min-height:90px;transition:border-color var(--transition);line-height:1.6}
.composer-textarea::placeholder{color:var(--muted)}.composer-textarea:focus{border-color:var(--accent)}
.mentions-dropdown{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);z-index:100;min-width:180px;overflow:hidden;display:none}
.mention-option{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;transition:background var(--transition)}
.mention-option:hover{background:var(--surface2)}
.mention-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.composer-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px}
.attach-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text2);font-family:var(--font-ui);font-size:12px;cursor:pointer;transition:all var(--transition)}
.attach-btn:hover{border-color:var(--accent);color:var(--accent)}
.pending-files{display:flex;flex-wrap:wrap;gap:6px}
.pending-file{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:11px}
.pending-remove{cursor:pointer;color:var(--muted);margin-left:2px}.pending-remove:hover{color:var(--critical)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:7px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--transition)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow)}.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.btn-danger{background:rgba(239,68,68,0.1);color:var(--critical);border:1px solid rgba(239,68,68,0.25)}.btn-danger:hover{background:rgba(239,68,68,0.2)}
.side-col{display:flex;flex-direction:column;gap:16px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.info-card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:16px}
.info-row{margin-bottom:14px}.info-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}.info-value{font-size:13px;font-weight:500}
.status-btns{display:flex;flex-direction:column;gap:6px}
.status-btn{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all var(--transition);text-align:left;display:flex;align-items:center;gap:8px}
.status-btn:hover{background:var(--surface2)}
.status-btn.active-open{background:rgba(14,165,233,0.1);color:var(--open);border-color:var(--open)}
.status-btn.active-inprogress{background:rgba(168,85,247,0.1);color:var(--inprogress);border-color:var(--inprogress)}
.status-btn.active-resolved{background:rgba(34,197,94,0.1);color:var(--resolved);border-color:var(--resolved)}
.priority-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.priority-btn{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all var(--transition);text-align:center}
.priority-btn:hover{background:var(--surface2)}
.priority-btn.active-low{background:rgba(34,197,94,0.1);color:var(--low);border-color:var(--low)}
.priority-btn.active-medium{background:rgba(245,158,11,0.1);color:var(--medium);border-color:var(--medium)}
.priority-btn.active-high{background:rgba(249,115,22,0.1);color:var(--high);border-color:var(--high)}
.priority-btn.active-critical{background:rgba(239,68,68,0.1);color:var(--critical);border-color:var(--critical)}
.assign-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-ui);font-size:13px;padding:8px 10px;outline:none;transition:border-color var(--transition);cursor:pointer}
.assign-select:focus{border-color:var(--accent)}.assign-select option{background:var(--surface)}
.timeline{display:flex;flex-direction:column}
.timeline-item{display:flex;gap:10px;padding-bottom:14px;position:relative}
.timeline-item:not(:last-child)::before{content:'';position:absolute;left:9px;top:20px;bottom:0;width:1px;background:var(--border)}
.timeline-dot{width:18px;height:18px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);flex-shrink:0;margin-top:2px}
.timeline-dot.active{background:var(--accent);border-color:var(--accent)}
.timeline-text{font-size:12px;color:var(--text2)}.timeline-time{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.not-found{text-align:center;padding:80px 24px}
.not-found-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.loading-wrap{display:flex;justify-content:center;align-items:center;min-height:200px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.3);font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all 0.25s ease;max-width:320px}
.toast.toast-show{opacity:1;transform:translateY(0)}
.toast-success{border-color:var(--low)}.toast-error{border-color:var(--critical)}.toast-info{border-color:var(--accent)}
.toast-icon{font-size:15px;flex-shrink:0}
@media(max-width:800px){.page{grid-template-columns:1fr}.side-col{order:-1}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">← Back</a>
    <div class="logo-small">Help<span>Desk</span></div>
    <span style="color:var(--muted);font-family:var(--font-mono);font-size:12px" id="topbar-id"></span>
  </div>
  <div class="topbar-actions">
    <div class="live-badge" id="liveBadge" style="display:none"><span class="live-dot"></span> Live</div>
    <button class="btn btn-ghost" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="btn btn-danger" id="deleteBtn" onclick="handleDelete()" style="display:none">🗑 Delete</button>
  </div>
</div>

<div id="pageContent">
  <div class="loading-wrap"><div class="spinner"></div></div>
</div>

<script>
const params    = new URLSearchParams(location.search);
const ticketId  = params.get('id');
let ticket      = null;
let commentType = 'public';
let pendingFiles= [];
let mentionQuery= '';
let mentionStart= -1;
let _unsub      = null;

// Fix theme btn on load
document.addEventListener('DOMContentLoaded', function() {
  const theme = document.documentElement.getAttribute('data-theme');
  const btn   = document.getElementById('themeBtn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';

  if (!ticketId) { showNotFound(); return; }
  document.getElementById('topbar-id').textContent = ticketId;

  const fbOk = initFirebase();
  if (fbOk) {
    document.getElementById('liveBadge').style.display = 'flex';
    document.getElementById('deleteBtn').style.display = '';
    _unsub = subscribeToTicket(ticketId, t => {
      if (!t) { showNotFound(); return; }
      ticket = t;
      renderPage();
    });
  } else {
    document.getElementById('pageContent').innerHTML = `
      <div class="not-found">
        <div class="not-found-icon">🔥</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px">Firebase not configured</div>
        <div style="color:var(--muted);margin-bottom:20px">Open app.js and paste your Firebase config.</div>
        <a href="index.html" class="btn btn-ghost">← Back</a>
      </div>`;
  }
});

function showNotFound() {
  document.getElementById('pageContent').innerHTML = `
    <div class="not-found">
      <div class="not-found-icon">🎫</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Ticket not found</div>
      <div style="color:var(--muted);margin-bottom:20px">This ticket may have been deleted.</div>
      <a href="index.html" class="btn btn-primary">← Back to Dashboard</a>
    </div>`;
}

function renderPage() {
  if (!ticket) return;
  const team = LOCAL.getTeam();

  const commentsHtml = ticket.comments.length
    ? [...ticket.comments].sort((a,b)=>new Date(a.created)-new Date(b.created)).map(c => {
        const member  = team.find(m=>m.name===c.author);
        const initial = member ? member.avatar : (c.author||'?')[0].toUpperCase();
        const avatarBg= c.type==='internal'?'var(--inprogress)':'var(--accent)';
        return `
          <div class="comment ${c.type}">
            <div class="comment-avatar" style="background:${avatarBg}">${initial}</div>
            <div class="comment-body">
              <div class="comment-header">
                <span class="comment-author">${escHtml(c.author)}</span>
                <span class="comment-time">${timeAgo(c.created)}</span>
                <span class="comment-type-badge badge-${c.type}">${c.type}</span>
              </div>
              <div class="comment-text">${renderMentions(c.text)}</div>
              ${c.attachments&&c.attachments.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${c.attachments.map(a=>`<a class="attachment-chip" href="${a.data}" download="${escHtml(a.name)}" target="_blank">${fileIcon(a.type)} ${escHtml(a.name)}</a>`).join('')}</div>`:''}
            </div>
          </div>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:13px;margin-bottom:16px">No comments yet — be the first to reply!</div>';

  const statuses=[['open','🔵','Open'],['inprogress','🟣','In Progress'],['resolved','🟢','Resolved']];
  const statusBtns=statuses.map(([s,icon,label])=>`<button class="status-btn${ticket.status===s?' active-'+s:''}" onclick="setStatus('${s}')">${icon} ${label}</button>`).join('');
  const priorities=[['low','Low'],['medium','Medium'],['high','High'],['critical','Critical']];
  const prioBtns=priorities.map(([p,l])=>`<button class="priority-btn${ticket.priority===p?' active-'+p:''}" onclick="setPriority('${p}')">${l}</button>`).join('');
  const assignOpts='<option value="">— Unassigned —</option>'+team.map(m=>`<option value="${escHtml(m.name)}"${ticket.assignee===m.name?' selected':''}>${escHtml(m.name)}</option>`).join('');
  const timeline=[
    {label:'Created',time:ticket.created,icon:'🎫',active:true},
    {label:'Last updated',time:ticket.updated,icon:'✏️',active:ticket.updated!==ticket.created},
    ...(ticket.resolvedAt?[{label:'Resolved',time:ticket.resolvedAt,icon:'✅',active:true}]:[]),
  ];
  const timelineHtml=timeline.map(t=>`<div class="timeline-item"><div class="timeline-dot${t.active?' active':''}"></div><div><div class="timeline-text">${t.icon} ${t.label}</div><div class="timeline-time">${new Date(t.time).toLocaleString()}</div></div></div>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="page">
      <div>
        <div class="ticket-header">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px">
            <div style="flex:1;min-width:0">
              <div class="ticket-id-badge">${ticket.id}</div>
              <div class="ticket-main-title">${escHtml(ticket.title)}</div>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap">
              <span class="pill pill-priority-${ticket.priority}">${ticket.priority}</span>
              <span class="pill pill-status-${ticket.status}">${ticket.status==='inprogress'?'In Progress':ticket.status.charAt(0).toUpperCase()+ticket.status.slice(1)}</span>
            </div>
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted)">
            <span>📁 ${ticket.category}</span><span>👤 ${escHtml(ticket.submitter)}</span>
            <span>🕐 ${timeAgo(ticket.created)}</span>
            ${ticket.assignee?`<span>🔧 ${escHtml(ticket.assignee)}</span>`:''}
          </div>
          ${ticket.desc?`<div class="ticket-desc-text">${escHtml(ticket.desc)}</div>`:''}
          ${ticket.attachments&&ticket.attachments.length?`<div style="margin-top:14px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px">📎 Attachments</div><div class="attachment-chips">${ticket.attachments.map(a=>`<a class="attachment-chip" href="${a.data}" download="${escHtml(a.name)}" target="_blank">${fileIcon(a.type)} ${escHtml(a.name)}</a>`).join('')}</div></div>`:''}
        </div>

        <div class="comments-section">
          <div class="section-title">💬 Comments <span style="font-size:13px;color:var(--muted);font-weight:400">(${ticket.comments.length})</span></div>
          <div id="commentsList">${commentsHtml}</div>
          <div class="composer">
            <div class="composer-tabs">
              <button class="composer-tab active-public" id="tab-public" onclick="setCommentType('public')">💬 Public Reply</button>
              <button class="composer-tab" id="tab-internal" onclick="setCommentType('internal')">🔒 Internal Note</button>
            </div>
            <div class="composer-name-row">
              <input class="composer-input" id="authorName" placeholder="Your name *">
              <input class="composer-input" id="authorEmail" placeholder="Your email *" type="email">
            </div>
            <div style="position:relative">
              <textarea class="composer-textarea" id="commentText" placeholder="Write a reply... Use @name to mention a team member" oninput="handleTextInput(event)" onkeydown="handleTextKeydown(event)"></textarea>
              <div class="mentions-dropdown" id="mentionsDropdown" style="position:absolute;top:100%;left:0;z-index:200"></div>
            </div>
            <div id="pendingFilesRow" class="pending-files" style="margin-top:8px"></div>
            <div class="composer-footer">
              <div style="display:flex;align-items:center;gap:8px">
                <label class="attach-btn" style="cursor:pointer">📎 Attach
                  <input type="file" id="attachInput" multiple style="display:none" accept="image/*,.pdf,.txt,.log,.csv,.doc,.docx" onchange="handleFileAttach(event)">
                </label>
                <span style="font-size:11px;color:var(--muted)">Ctrl+Enter to send</span>
              </div>
              <button class="btn btn-primary" id="sendBtn" onclick="submitComment()">Send Reply →</button>
            </div>
          </div>
        </div>
      </div>

      <div class="side-col">
        <div class="info-card"><div class="info-card-title">Update Status</div><div class="status-btns">${statusBtns}</div></div>
        <div class="info-card"><div class="info-card-title">Priority</div><div class="priority-btns">${prioBtns}</div></div>
        <div class="info-card"><div class="info-card-title">Assigned To</div><select class="assign-select" onchange="setAssignee(this.value)">${assignOpts}</select></div>
        <div class="info-card">
          <div class="info-card-title">Ticket Details</div>
          <div class="info-row"><div class="info-label">ID</div><div class="info-value" style="font-family:var(--font-mono);font-size:12px">${ticket.id}</div></div>
          <div class="info-row"><div class="info-label">Category</div><div class="info-value">${ticket.category}</div></div>
          <div class="info-row"><div class="info-label">Submitted By</div><div class="info-value">${escHtml(ticket.submitter)}</div></div>
          ${ticket.submitterEmail?`<div class="info-row"><div class="info-label">Email</div><div class="info-value" style="font-size:12px;word-break:break-all">${escHtml(ticket.submitterEmail)}</div></div>`:''}
          <div class="info-row"><div class="info-label">Comments</div><div class="info-value">${ticket.comments.length}</div></div>
        </div>
        <div class="info-card"><div class="info-card-title">Timeline</div><div class="timeline">${timelineHtml}</div></div>
      </div>
    </div>`;

  document.getElementById('commentText').addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') submitComment(); });
  setCommentType(commentType, false);
}

// ---- ACTIONS ----
async function setStatus(s)   { await updateTicket(ticketId,{status:s});   showToast('Status updated','success'); }
async function setPriority(p) { await updateTicket(ticketId,{priority:p}); showToast('Priority set to '+p,'success'); }
async function setAssignee(n) { await updateTicket(ticketId,{assignee:n}); showToast(n?'Assigned to '+n:'Unassigned','info'); }

function setCommentType(type, focus=true) {
  commentType=type;
  const tabPub=document.getElementById('tab-public');
  const tabInt=document.getElementById('tab-internal');
  if(tabPub) tabPub.className='composer-tab'+(type==='public'?' active-public':'');
  if(tabInt) tabInt.className='composer-tab'+(type==='internal'?' active-internal':'');
}

// ---- @MENTIONS ----
function handleTextInput(e) {
  const ta=e.target,val=ta.value,pos=ta.selectionStart;
  const match=val.slice(0,pos).match(/@(\w*)$/);
  if(match){mentionQuery=match[1].toLowerCase();mentionStart=pos-match[0].length;showMentionsDD(mentionQuery);}
  else hideMentionsDD();
}
function handleTextKeydown(e) { const dd=document.getElementById('mentionsDropdown'); if(dd&&dd.style.display==='block'&&e.key==='Escape'){hideMentionsDD();e.preventDefault();} }
function showMentionsDD(q) {
  const team=LOCAL.getTeam(),matches=team.filter(m=>m.name.toLowerCase().startsWith(q));
  const dd=document.getElementById('mentionsDropdown');
  if(!matches.length||!dd){hideMentionsDD();return;}
  dd.style.display='block';
  dd.innerHTML=matches.map(m=>`<div class="mention-option" onclick="insertMention('${escHtml(m.name)}')"><div class="mention-avatar">${m.avatar}</div><div><div style="font-weight:600;font-size:13px">${escHtml(m.name)}</div><div style="font-size:11px;color:var(--muted)">${m.role}</div></div></div>`).join('');
}
function hideMentionsDD(){ const dd=document.getElementById('mentionsDropdown'); if(dd) dd.style.display='none'; mentionStart=-1; }
function insertMention(name) {
  const ta=document.getElementById('commentText'); if(!ta) return;
  const before=ta.value.slice(0,mentionStart),after=ta.value.slice(ta.selectionStart);
  ta.value=before+'@'+name+' '+after;
  const pos=before.length+name.length+2; ta.setSelectionRange(pos,pos); ta.focus(); hideMentionsDD();
}

// ---- FILES ----
function handleFileAttach(e) {
  Array.from(e.target.files).forEach(file=>{
    if(file.size>2*1024*1024){showToast(file.name+' exceeds 2MB','error');return;}
    const r=new FileReader(); r.onload=ev=>{pendingFiles.push({name:file.name,type:file.type,data:ev.target.result});renderPendingFiles();}; r.readAsDataURL(file);
  }); e.target.value='';
}
function renderPendingFiles() {
  const row=document.getElementById('pendingFilesRow'); if(!row) return;
  row.innerHTML=pendingFiles.map((f,i)=>`<div class="pending-file">${fileIcon(f.type)} ${escHtml(f.name)}<span class="pending-remove" onclick="removePending(${i})">✕</span></div>`).join('');
}
function removePending(i){pendingFiles.splice(i,1);renderPendingFiles();}

// ---- SUBMIT COMMENT ----
async function submitComment() {
  const name =(document.getElementById('authorName')?.value||'').trim();
  const email=(document.getElementById('authorEmail')?.value||'').trim();
  const text =(document.getElementById('commentText')?.value||'').trim();
  if(!name) {showToast('Please enter your name','error');return;}
  if(!email){showToast('Please enter your email','error');return;}
  if(!text&&!pendingFiles.length){showToast('Please write a message','error');return;}
  const btn=document.getElementById('sendBtn');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try {
    await addComment(ticketId,{author:name,text,type:commentType,attachments:[...pendingFiles],mentions:extractMentions(text)});
    pendingFiles=[];
    const ta=document.getElementById('commentText'); if(ta) ta.value='';
    renderPendingFiles();
    showToast(commentType==='internal'?'Internal note added':'Reply posted','success');
  } catch(e){showToast('Error sending reply','error');console.error(e);}
  finally{if(btn){btn.disabled=false;btn.textContent='Send Reply →';}}
}

// ---- DELETE ----
async function handleDelete() {
  if(!confirm(`Delete ${ticketId}? This cannot be undone.`)) return;
  if(_unsub) _unsub();
  await deleteTicket(ticketId);
  showToast('Ticket deleted','error');
  setTimeout(()=>window.location.href='index.html',1000);
}
</script>
</body>
</html>
