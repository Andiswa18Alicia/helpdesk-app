<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelpDesk Pro — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== TOKENS ===== */
:root {
  --accent:      #0ea5e9;
  --accent-dim:  rgba(14,165,233,0.12);
  --accent-glow: rgba(14,165,233,0.25);
  --low:         #22c55e;
  --medium:      #f59e0b;
  --high:        #f97316;
  --critical:    #ef4444;
  --open:        #0ea5e9;
  --inprogress:  #a855f7;
  --resolved:    #22c55e;
  --radius:      10px;
  --font-ui:     'Bricolage Grotesque', sans-serif;
  --font-mono:   'Fira Code', monospace;
  --transition:  0.2s ease;
}

[data-theme="light"] {
  --bg:        #f0f4f8;
  --surface:   #ffffff;
  --surface2:  #f7f9fc;
  --border:    #dde3ec;
  --text:      #1a202c;
  --text2:     #4a5568;
  --muted:     #8a96a8;
  --shadow:    0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.05);
}
[data-theme="dark"] {
  --bg:        #0c0e14;
  --surface:   #13151f;
  --surface2:  #1a1d2a;
  --border:    #252836;
  --text:      #e8eaf2;
  --text2:     #9099b0;
  --muted:     #555e72;
  --shadow:    0 1px 4px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* ===== LAYOUT ===== */
.shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 0 0 24px;
}

.logo {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.logo-mark {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 0 16px var(--accent-glow);
}

.logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
.logo-text span { color: var(--accent); }

.nav-section { padding: 8px 12px 4px; }
.nav-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); font-weight: 500; padding: 0 8px; margin-bottom: 4px; }

.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px;
  border-radius: 7px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  border: none; background: none; width: 100%; text-align: left;
  transition: all var(--transition);
  text-decoration: none;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item-left { display: flex; align-items: center; gap: 9px; }
.nav-item-icon { font-size: 15px; width: 20px; text-align: center; }

.nav-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  font-family: var(--font-mono);
}

.sidebar-bottom {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
}

.theme-btn {
  width: 100%;
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px;
  border-radius: 7px;
  border: none; background: none; cursor: pointer;
  color: var(--text2); font-family: var(--font-ui); font-size: 13px; font-weight: 500;
  transition: all var(--transition);
}
.theme-btn:hover { background: var(--surface2); color: var(--text); }

/* ===== MAIN ===== */
.main { display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  position: sticky; top: 0; z-index: 10;
}

.page-title { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.page-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

.topbar-actions { display: flex; align-items: center; gap: 10px; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px;
  border-radius: 7px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: all var(--transition);
  text-decoration: none;
}
.btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 0 16px var(--accent-glow);
}
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ghost {
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--accent); }

/* ===== CONTENT ===== */
.content { padding: 24px 28px; flex: 1; overflow-y: auto; }

/* ===== STATS GRID ===== */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.stat-card:nth-child(2) { animation-delay: 0.05s; }
.stat-card:nth-child(3) { animation-delay: 0.1s; }
.stat-card:nth-child(4) { animation-delay: 0.15s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.stat-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--card-color, var(--accent));
  opacity: 0.6;
}

.stat-icon { font-size: 22px; margin-bottom: 10px; }
.stat-num { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; color: var(--card-color, var(--text)); }
.stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: var(--font-mono); }

/* ===== CHARTS ROW ===== */
.charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 28px; }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.chart-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

/* Mini bar chart */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-label { font-size: 12px; color: var(--text2); min-width: 70px; font-weight: 500; }
.bar-track { flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.bar-count { font-size: 11px; color: var(--muted); min-width: 24px; text-align: right; font-family: var(--font-mono); }

/* Donut chart */
.donut-wrap { display: flex; align-items: center; gap: 20px; }
.donut-svg { flex-shrink: 0; }
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-val { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

/* ===== TICKET TABLE SECTION ===== */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
  gap: 12px;
}
.section-title { font-size: 15px; font-weight: 700; }

.filters-row { display: flex; gap: 8px; flex-wrap: wrap; }

.filter-chip {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: var(--font-ui); font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  transition: all var(--transition);
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.search-bar {
  display: flex; align-items: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 0 12px; gap: 8px;
  transition: border-color var(--transition);
}
.search-bar:focus-within { border-color: var(--accent); }
.search-bar span { color: var(--muted); font-size: 14px; }
.search-bar input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font-ui); font-size: 13px;
  padding: 8px 0; width: 200px;
}
.search-bar input::placeholder { color: var(--muted); }

/* ===== TICKET LIST ===== */
.ticket-list { display: flex; flex-direction: column; gap: 8px; }

.ticket-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 90px 1fr auto auto auto;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  color: var(--text);
  box-shadow: var(--shadow);
  animation: fadeUp 0.3s ease both;
  border-left: 3px solid transparent;
}
.ticket-row:hover { border-color: var(--accent); transform: translateX(2px); background: var(--surface2); }
.ticket-row.priority-low      { border-left-color: var(--low); }
.ticket-row.priority-medium   { border-left-color: var(--medium); }
.ticket-row.priority-high     { border-left-color: var(--high); }
.ticket-row.priority-critical { border-left-color: var(--critical); }

.ticket-id-col { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
.ticket-info { min-width: 0; }
.ticket-title-text { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.ticket-meta-row { display: flex; gap: 12px; font-size: 11px; color: var(--muted); }

.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
  white-space: nowrap;
}
.pill-priority-low      { background: rgba(34,197,94,0.12);   color: var(--low);      border: 1px solid rgba(34,197,94,0.25); }
.pill-priority-medium   { background: rgba(245,158,11,0.12);  color: var(--medium);   border: 1px solid rgba(245,158,11,0.25); }
.pill-priority-high     { background: rgba(249,115,22,0.12);  color: var(--high);     border: 1px solid rgba(249,115,22,0.25); }
.pill-priority-critical { background: rgba(239,68,68,0.12);   color: var(--critical); border: 1px solid rgba(239,68,68,0.25); }
.pill-status-open       { background: rgba(14,165,233,0.12);  color: var(--open);     border: 1px solid rgba(14,165,233,0.25); }
.pill-status-inprogress { background: rgba(168,85,247,0.12);  color: var(--inprogress); border: 1px solid rgba(168,85,247,0.25); }
.pill-status-resolved   { background: rgba(34,197,94,0.12);   color: var(--resolved); border: 1px solid rgba(34,197,94,0.25); }

.assignee-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.assignee-avatar.empty { background: var(--surface2); color: var(--muted); border: 1px dashed var(--border); }

.ticket-time { font-size: 11px; color: var(--muted); white-space: nowrap; font-family: var(--font-mono); }

/* Empty state */
.empty-state {
  text-align: center; padding: 80px 24px;
  animation: fadeUp 0.4s ease;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.empty-sub { color: var(--muted); font-size: 13px; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  z-index: 500; align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; width: 100%; max-width: 560px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  animation: modalIn 0.25s ease;
  overflow: hidden;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: all var(--transition); }
.modal-close:hover { color: var(--text); border-color: var(--accent); }
.modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; max-height: 70vh; overflow-y: auto; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
.form-input, .form-select, .form-textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: var(--font-ui); font-size: 13px;
  padding: 9px 12px; outline: none;
  transition: border-color var(--transition); width: 100%;
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select option { background: var(--surface); }

/* Settings panel */
.settings-section { margin-bottom: 20px; }
.settings-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.toggle-label { font-size: 13px; }
.toggle { position: relative; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: background var(--transition); }
.toggle-slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform var(--transition); }
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  font-size: 13px; font-weight: 500;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s ease;
  max-width: 320px;
}
.toast.toast-show { opacity: 1; transform: translateY(0); }
.toast-success { border-color: var(--low); }
.toast-error   { border-color: var(--critical); }
.toast-info    { border-color: var(--accent); }
.toast-icon { font-size: 15px; flex-shrink: 0; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .charts-row { grid-template-columns: 1fr; }
  .ticket-row { grid-template-columns: 1fr auto; }
  .ticket-id-col, .ticket-time { display: none; }
}
</style>
<script src="app.js"></script>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-mark">🎫</div>
      <div class="logo-text">Help<span>Desk</span></div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a class="nav-item active" href="index.html">
        <span class="nav-item-left"><span class="nav-item-icon">📊</span> Dashboard</span>
      </a>
      <button class="nav-item" onclick="showAllTickets()">
        <span class="nav-item-left"><span class="nav-item-icon">🎫</span> All Tickets</span>
        <span class="nav-badge" id="nav-total">0</span>
      </button>
      <button class="nav-item" onclick="filterNav('open')">
        <span class="nav-item-left"><span class="nav-item-icon">🔵</span> Open</span>
        <span class="nav-badge" id="nav-open" style="background:var(--open)">0</span>
      </button>
      <button class="nav-item" onclick="filterNav('inprogress')">
        <span class="nav-item-left"><span class="nav-item-icon">🟣</span> In Progress</span>
        <span class="nav-badge" id="nav-prog" style="background:var(--inprogress)">0</span>
      </button>
      <button class="nav-item" onclick="filterNav('resolved')">
        <span class="nav-item-left"><span class="nav-item-icon">🟢</span> Resolved</span>
        <span class="nav-badge" id="nav-res" style="background:var(--resolved)">0</span>
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Priority</div>
      <button class="nav-item" onclick="filterPriority('critical')">
        <span class="nav-item-left"><span class="nav-item-icon">🔴</span> Critical</span>
        <span class="nav-badge" id="nav-crit" style="background:var(--critical)">0</span>
      </button>
      <button class="nav-item" onclick="filterPriority('high')">
        <span class="nav-item-left"><span class="nav-item-icon">🟠</span> High</span>
        <span class="nav-badge" id="nav-high" style="background:var(--high)">0</span>
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Settings</div>
      <button class="nav-item" onclick="openSettings()">
        <span class="nav-item-left"><span class="nav-item-icon">⚙️</span> Settings</span>
      </button>
    </div>

    <div class="sidebar-bottom">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">Toggle Theme</span>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-sub" id="topbar-sub">Loading...</div>
      </div>
      <div class="topbar-actions">
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Search tickets..." oninput="renderList()">
        </div>
        <button class="btn btn-primary" onclick="openNewModal()">＋ New Ticket</button>
      </div>
    </div>

    <div class="content">
      <!-- STATS -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- CHARTS -->
      <div class="charts-row" id="chartsRow"></div>

      <!-- TICKET LIST -->
      <div class="section-header">
        <div class="section-title" id="listTitle">All Tickets</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <div class="filters-row" id="filtersRow"></div>
          <select class="btn btn-ghost" style="padding:6px 10px;font-size:12px;" id="sortSelect" onchange="renderList()">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="priority">Priority</option>
            <option value="status">Status</option>
          </select>
        </div>
      </div>
      <div class="ticket-list" id="ticketList"></div>
    </div>
  </div>
</div>

<!-- NEW TICKET MODAL -->
<div class="modal-overlay" id="newModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🎫 Create New Ticket</div>
      <button class="modal-close" onclick="closeNewModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="nTitle" placeholder="Brief description of the issue...">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="nDesc" placeholder="Detailed description..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category / Department</label>
          <select class="form-select" id="nCategory">
            <option>IT</option><option>HR</option><option>Billing</option>
            <option>Security</option><option>Facilities</option><option>Finance</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="nPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Submitted By</label>
          <input class="form-input" id="nSubmitter" placeholder="Name...">
        </div>
        <div class="form-group">
          <label class="form-label">Submitter Email</label>
          <input class="form-input" id="nEmail" type="email" placeholder="email@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Assign To</label>
        <select class="form-select" id="nAssignee">
          <option value="">— Unassigned —</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeNewModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitNewTicket()">Create Ticket</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ Settings</div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">

      <div class="settings-section">
        <h3>Team Members</h3>
        <div id="teamList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div>
        <div class="form-row">
          <input class="form-input" id="newMemberName" placeholder="Name">
          <input class="form-input" id="newMemberEmail" placeholder="Email">
        </div>
        <button class="btn btn-ghost" style="margin-top:8px;width:100%;" onclick="addTeamMember()">＋ Add Member</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>
</div>

<script>
// ---- STATE ----
let activeStatus   = 'all';
let activePriority = 'all';

const PRIORITY_ORDER = { critical:0, high:1, medium:2, low:3 };
const STATUS_ORDER   = { open:0, inprogress:1, resolved:2 };

// ---- INIT ----
function init() {
  updateThemeBtn();
  renderStats();
  renderCharts();
  renderList();
  updateNavBadges();
  populateAssignee();
}

function updateThemeBtn() {
  const theme = document.documentElement.getAttribute('data-theme');
  const icon  = document.getElementById('themeIcon');
  if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ---- STATS ----
function renderStats() {
  const s   = getDashboardStats();
  const grid = document.getElementById('statsGrid');
  const today = new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'short'});
  document.getElementById('topbar-sub').textContent = today + ' · ' + s.total + ' total tickets';

  grid.innerHTML = `
    <div class="stat-card" style="--card-color:var(--accent)">
      <div class="stat-icon">🎫</div>
      <div class="stat-num">${s.total}</div>
      <div class="stat-label">Total Tickets</div>
      <div class="stat-sub">+${s.today} today</div>
    </div>
    <div class="stat-card" style="--card-color:var(--open)">
      <div class="stat-icon">🔵</div>
      <div class="stat-num">${s.byStatus.open || 0}</div>
      <div class="stat-label">Open</div>
      <div class="stat-sub">${s.byStatus.inprogress || 0} in progress</div>
    </div>
    <div class="stat-card" style="--card-color:var(--resolved)">
      <div class="stat-icon">✅</div>
      <div class="stat-num">${s.byStatus.resolved || 0}</div>
      <div class="stat-label">Resolved</div>
      <div class="stat-sub">avg ${formatDuration(s.avgResMs)}</div>
    </div>
    <div class="stat-card" style="--card-color:var(--critical)">
      <div class="stat-icon">🔴</div>
      <div class="stat-num">${s.byPriority.critical || 0}</div>
      <div class="stat-label">Critical</div>
      <div class="stat-sub">${s.byPriority.high || 0} high priority</div>
    </div>`;
}

// ---- CHARTS ----
function renderCharts() {
  const s = getDashboardStats();
  const row = document.getElementById('chartsRow');

  // Bar: by category
  const cats = Object.entries(s.byCategory).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCat = cats[0]?.[1] || 1;
  const catBars = cats.map(([k,v]) => `
    <div class="bar-row">
      <span class="bar-label">${k}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/maxCat)*100}%;background:var(--accent)"></div></div>
      <span class="bar-count">${v}</span>
    </div>`).join('');

  // Bar: by priority
  const priorities = [['Critical','critical','--critical'],['High','high','--high'],['Medium','medium','--medium'],['Low','low','--low']];
  const maxP = Math.max(...priorities.map(([,k]) => s.byPriority[k]||0), 1);
  const prioBars = priorities.map(([label,key,color]) => `
    <div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${((s.byPriority[key]||0)/maxP)*100}%;background:var(${color})"></div></div>
      <span class="bar-count">${s.byPriority[key]||0}</span>
    </div>`).join('');

  // Donut: by status
  const statusData = [
    { label:'Open',        key:'open',        color:'var(--open)',        hex:'#0ea5e9' },
    { label:'In Progress', key:'inprogress',   color:'var(--inprogress)', hex:'#a855f7' },
    { label:'Resolved',    key:'resolved',     color:'var(--resolved)',    hex:'#22c55e' },
  ];
  const total = s.total || 1;
  let offset = 0;
  const slices = statusData.map(d => {
    const val  = s.byStatus[d.key] || 0;
    const pct  = val / total;
    const dash = pct * 100;
    const gap  = 100 - dash;
    const slice = `<circle cx="20" cy="20" r="15.9" fill="none" stroke="${d.hex}" stroke-width="4"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" style="transition:stroke-dasharray 0.6s ease"/>`;
    offset += dash;
    return slice;
  }).join('');
  const legend = statusData.map(d => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${d.color}"></span>
      <span>${d.label}</span>
      <span class="legend-val">${s.byStatus[d.key]||0}</span>
    </div>`).join('');

  row.innerHTML = `
    <div class="chart-card">
      <div class="chart-title">By Category</div>
      ${catBars || '<div style="color:var(--muted);font-size:12px">No data</div>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">By Priority</div>
      ${prioBars}
    </div>
    <div class="chart-card">
      <div class="chart-title">By Status</div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="80" height="80" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="15.9" fill="none" stroke="var(--surface2)" stroke-width="4"/>
          ${slices}
        </svg>
        <div class="donut-legend">${legend}</div>
      </div>
    </div>`;
}

// ---- NAV BADGES ----
function updateNavBadges() {
  const tickets = HD.getTickets();
  document.getElementById('nav-total').textContent = tickets.length;
  document.getElementById('nav-open').textContent  = tickets.filter(t=>t.status==='open').length;
  document.getElementById('nav-prog').textContent  = tickets.filter(t=>t.status==='inprogress').length;
  document.getElementById('nav-res').textContent   = tickets.filter(t=>t.status==='resolved').length;
  document.getElementById('nav-crit').textContent  = tickets.filter(t=>t.priority==='critical').length;
  document.getElementById('nav-high').textContent  = tickets.filter(t=>t.priority==='high').length;
}

// ---- FILTER CHIPS ----
function renderFilterChips() {
  const row = document.getElementById('filtersRow');
  const chips = [
    ['all','All',true],['open','Open'],['inprogress','In Progress'],['resolved','Resolved']
  ];
  row.innerHTML = chips.map(([val, label]) =>
    `<button class="filter-chip${activeStatus===val?' active':''}" onclick="filterNav('${val}')">${label}</button>`
  ).join('');
}

// ---- TICKET LIST ----
function getFiltered() {
  let list = HD.getTickets();
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  if (q) list = list.filter(t =>
    t.title.toLowerCase().includes(q) || t.id.toLowerCase().includes(q) ||
    t.submitter.toLowerCase().includes(q) || t.category.toLowerCase().includes(q) ||
    t.desc.toLowerCase().includes(q)
  );
  if (activeStatus !== 'all') list = list.filter(t => t.status === activeStatus);
  if (activePriority !== 'all') list = list.filter(t => t.priority === activePriority);
  const sort = document.getElementById('sortSelect')?.value || 'newest';
  if (sort==='newest')   list.sort((a,b)=>new Date(b.created)-new Date(a.created));
  if (sort==='oldest')   list.sort((a,b)=>new Date(a.created)-new Date(b.created));
  if (sort==='priority') list.sort((a,b)=>PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority]);
  if (sort==='status')   list.sort((a,b)=>STATUS_ORDER[a.status]-STATUS_ORDER[b.status]);
  return list;
}

function renderList() {
  renderFilterChips();
  const list  = getFiltered();
  const el    = document.getElementById('ticketList');
  const team  = HD.getTeam();

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎫</div>
      <div class="empty-title">No tickets found</div>
      <div class="empty-sub">Try a different filter or create a new ticket</div>
    </div>`;
    return;
  }

  el.innerHTML = list.map(t => {
    const member  = team.find(m => m.name === t.assignee);
    const initial = member ? member.avatar : (t.assignee ? t.assignee[0].toUpperCase() : '?');
    const isEmpty = !t.assignee;
    return `
    <a class="ticket-row priority-${t.priority}" href="ticket.html?id=${t.id}">
      <span class="ticket-id-col">${t.id}</span>
      <div class="ticket-info">
        <div class="ticket-title-text">${escHtml(t.title)}</div>
        <div class="ticket-meta-row">
          <span>📁 ${t.category}</span>
          <span>👤 ${escHtml(t.submitter)}</span>
          ${t.comments.length ? `<span>💬 ${t.comments.length}</span>` : ''}
          ${t.attachments.length ? `<span>📎 ${t.attachments.length}</span>` : ''}
        </div>
      </div>
      <span class="pill pill-priority-${t.priority}">${t.priority}</span>
      <span class="pill pill-status-${t.status}">${t.status==='inprogress'?'In Progress':t.status.charAt(0).toUpperCase()+t.status.slice(1)}</span>
      <div class="assignee-avatar${isEmpty?' empty':''}" title="${t.assignee||'Unassigned'}">${isEmpty?'?':initial}</div>
      <span class="ticket-time">${timeAgo(t.created)}</span>
    </a>`;
  }).join('');
}

// ---- FILTER ACTIONS ----
function filterNav(status) {
  activeStatus   = status;
  activePriority = 'all';
  document.getElementById('listTitle').textContent =
    status === 'all' ? 'All Tickets' : status === 'inprogress' ? 'In Progress' : status.charAt(0).toUpperCase()+status.slice(1);
  renderList();
}

function filterPriority(p) {
  activePriority = p;
  activeStatus   = 'all';
  document.getElementById('listTitle').textContent = p.charAt(0).toUpperCase()+p.slice(1)+' Priority';
  renderList();
}

function showAllTickets() { filterNav('all'); }

// ---- NEW TICKET ----
function populateAssignee() {
  const sel  = document.getElementById('nAssignee');
  const team = HD.getTeam();
  sel.innerHTML = '<option value="">— Unassigned —</option>' +
    team.map(m => `<option value="${escHtml(m.name)}">${escHtml(m.name)} (${m.role})</option>`).join('');
}

function openNewModal() {
  populateAssignee();
  document.getElementById('newModal').classList.add('open');
  document.getElementById('nTitle').focus();
}

function closeNewModal() {
  document.getElementById('newModal').classList.remove('open');
  ['nTitle','nDesc','nSubmitter','nEmail'].forEach(id => document.getElementById(id).value='');
}

function submitNewTicket() {
  const title = document.getElementById('nTitle').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  const t = createTicket({
    title,
    desc:          document.getElementById('nDesc').value.trim(),
    category:      document.getElementById('nCategory').value,
    priority:      document.getElementById('nPriority').value,
    submitter:     document.getElementById('nSubmitter').value.trim() || 'Anonymous',
    submitterEmail:document.getElementById('nEmail').value.trim(),
    assignee:      document.getElementById('nAssignee').value,
  });
  closeNewModal();
  renderStats();
  renderCharts();
  renderList();
  updateNavBadges();
  showToast(`${t.id} created!`, 'success');
}

// ---- SETTINGS ----
function openSettings() {
  const s    = HD.getSettings();
  const team = HD.getTeam();

  renderTeamList(team);
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function renderTeamList(team) {
  document.getElementById('teamList').innerHTML = team.map((m,i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:7px;">
      <div class="assignee-avatar" style="background:var(--accent)">${m.avatar}</div>
      <div style="flex:1"><div style="font-weight:600;font-size:13px">${escHtml(m.name)}</div>
        <div style="font-size:11px;color:var(--muted)">${escHtml(m.email)} · ${m.role}</div></div>
      <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" onclick="removeTeamMember(${i})">✕</button>
    </div>`).join('');
}

function addTeamMember() {
  const name  = document.getElementById('newMemberName').value.trim();
  const email = document.getElementById('newMemberEmail').value.trim();
  if (!name) { showToast('Name required', 'error'); return; }
  const team = HD.getTeam();
  team.push({ name, email, role: 'Agent', avatar: name[0].toUpperCase() });
  HD.saveTeam(team);
  renderTeamList(team);
  document.getElementById('newMemberName').value  = '';
  document.getElementById('newMemberEmail').value = '';
}

function removeTeamMember(i) {
  const team = HD.getTeam();
  team.splice(i, 1);
  HD.saveTeam(team);
  renderTeamList(team);
}

function saveSettings() {
  HD.saveSettings({

  });
  closeSettings();
  showToast('Settings saved!', 'success');
}

// Close modals on overlay click
['newModal','settingsModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if(e.target.id===id) document.getElementById(id).classList.remove('open'); });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeNewModal(); closeSettings(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); openNewModal(); }
});

init();
</script>
</body>
</html>
