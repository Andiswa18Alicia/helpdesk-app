<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — HelpDesk Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<style>
:root{--accent:#0ea5e9;--accent-dim:rgba(14,165,233,0.12);--accent-glow:rgba(14,165,233,0.25);--low:#22c55e;--medium:#f59e0b;--high:#f97316;--critical:#ef4444;--open:#0ea5e9;--inprogress:#a855f7;--resolved:#22c55e;--radius:10px;--font-ui:'Bricolage Grotesque',sans-serif;--font-mono:'Fira Code',monospace;--transition:0.2s ease}
[data-theme="light"]{--bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;--border:#dde3ec;--text:#1a202c;--text2:#4a5568;--muted:#8a96a8;--shadow:0 1px 4px rgba(0,0,0,0.08),0 4px 16px rgba(0,0,0,0.05)}
[data-theme="dark"]{--bg:#0c0e14;--surface:#13151f;--surface2:#1a1d2a;--border:#252836;--text:#e8eaf2;--text2:#9099b0;--muted:#555e72;--shadow:0 1px 4px rgba(0,0,0,0.4),0 4px 16px rgba(0,0,0,0.3)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;line-height:1.6;min-height:100vh;transition:background var(--transition),color var(--transition)}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:14px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:7px;border:1px solid var(--border);transition:all var(--transition)}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-title{font-size:18px;font-weight:800;letter-spacing:-0.02em}
.page-sub{font-size:12px;color:var(--muted);margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:7px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--transition)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.btn-ghost.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* PERIOD TABS */
.period-tabs{display:flex;gap:8px;padding:20px 28px 0}
.period-tab{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all var(--transition)}
.period-tab:hover{border-color:var(--accent);color:var(--accent)}
.period-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 16px var(--accent-glow)}

/* CONTENT */
.content{padding:20px 28px 40px;display:flex;flex-direction:column;gap:24px}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;animation:fadeUp 0.4s ease both}
.sum-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--card-color,var(--accent))}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sum-icon{font-size:20px;margin-bottom:8px}
.sum-num{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:var(--card-color,var(--text));line-height:1}
.sum-label{font-size:11px;color:var(--muted);font-weight:500;margin-top:4px}
.sum-change{font-size:11px;margin-top:6px;font-family:var(--font-mono)}
.up{color:var(--low)}.down{color:var(--critical)}.neutral{color:var(--muted)}

/* CHART CARDS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:13px;font-weight:700;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--muted);margin-bottom:18px}
.chart-area{width:100%;overflow:hidden}

/* SVG CHARTS */
.chart-svg{width:100%;overflow:visible}
.bar-group:hover .bar-rect{filter:brightness(1.15)}
.chart-tooltip{pointer-events:none}
.axis-label{font-family:'Fira Code',monospace;font-size:10px;fill:var(--muted,#8a96a8)}
.grid-line{stroke:var(--border,#dde3ec);stroke-dasharray:4,4}
.line-path{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.line-dot{r:4;stroke-width:2;stroke:#fff}
.area-path{opacity:0.12}
.legend-dot{r:5}

/* ADMIN PERFORMANCE */
.admin-perf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.admin-perf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.admin-perf-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--admin-color)}
.admin-perf-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.admin-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.admin-perf-name{font-size:15px;font-weight:800}
.admin-perf-dept{font-size:11px;color:var(--muted)}
.perf-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.perf-stat{background:var(--surface2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.perf-stat-num{font-size:22px;font-weight:800;letter-spacing:-0.02em;color:var(--admin-color)}
.perf-stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.perf-rate-wrap{margin-bottom:14px}
.perf-rate-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.perf-rate-label span:first-child{color:var(--text2);font-weight:600}
.perf-rate-label span:last-child{font-weight:700;font-family:var(--font-mono)}
.perf-bar-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.perf-bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease}
.perf-verdict{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;font-size:12px;font-weight:600}
.verdict-great{background:rgba(34,197,94,0.1);color:var(--low);border:1px solid rgba(34,197,94,0.25)}
.verdict-good{background:rgba(14,165,233,0.1);color:var(--accent);border:1px solid rgba(14,165,233,0.25)}
.verdict-ok{background:rgba(245,158,11,0.1);color:var(--medium);border:1px solid rgba(245,158,11,0.25)}
.verdict-low{background:rgba(239,68,68,0.1);color:var(--critical);border:1px solid rgba(239,68,68,0.25)}

/* SECTION HEADING */
.section-heading{display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:16px;font-weight:800;letter-spacing:-0.01em}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* RANKING TABLE */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.rank-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:var(--surface2)}
.rank-num{font-family:var(--font-mono);font-size:12px;color:var(--muted);width:30px}
.rank-medal{font-size:16px;width:30px}
.rate-pill{display:inline-flex;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--font-mono)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.3);font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all 0.25s ease}
.toast.toast-show{opacity:1;transform:translateY(0)}
.toast-success{border-color:#22c55e}.toast-icon{font-size:15px}

/* LOADING */
.loading-wrap{display:flex;justify-content:center;align-items:center;padding:80px;flex-direction:column;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:1000px){.summary-grid{grid-template-columns:repeat(3,1fr)}.admin-perf-grid{grid-template-columns:1fr}.charts-row{grid-template-columns:1fr}}
@media(max-width:600px){.summary-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">← Dashboard</a>
    <div>
      <div class="page-title">📊 Reports</div>
      <div class="page-sub" id="reportSub">Loading data...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="live-badge" id="liveBadge" style="display:none"><span class="live-dot"></span>Live</div>
    <button class="btn btn-ghost" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="btn btn-ghost" onclick="clearSession();window.location.href='login.html'" style="font-size:12px">Sign Out</button>
  </div>
</div>

<!-- PERIOD TABS -->
<div class="period-tabs">
  <button class="period-tab active" id="tab-weekly" onclick="setPeriod('weekly')">📅 This Week</button>
  <button class="period-tab" id="tab-monthly" onclick="setPeriod('monthly')">🗓️ This Month</button>
  <button class="period-tab" id="tab-alltime" onclick="setPeriod('alltime')">📈 All Time</button>
</div>

<div class="content" id="mainContent">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:13px">Loading reports...</div>
  </div>
</div>

<script>
let allTickets = [];
let period     = 'weekly';

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAdmin()) return;
  const theme = document.documentElement.getAttribute('data-theme');
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';

  const fbOk = initFirebase();
  if (fbOk) {
    document.getElementById('liveBadge').style.display = 'flex';
    subscribeToTickets(tickets => {
      allTickets = tickets;
      renderReports();
    });
  } else {
    document.getElementById('mainContent').innerHTML = `<div class="loading-wrap"><div style="font-size:32px">🔥</div><div style="font-weight:700">Firebase not configured</div><div style="color:var(--muted)">Open app.js and paste your config.</div></div>`;
  }
});

function setPeriod(p) {
  period = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + p).classList.add('active');
  renderReports();
}

// ── FILTER BY PERIOD ──────────────────────────────────────────
function getTicketsForPeriod(tickets, p) {
  const now  = new Date();
  const start = new Date();
  if (p === 'weekly') {
    const day = now.getDay();
    start.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
    start.setHours(0,0,0,0);
  } else if (p === 'monthly') {
    start.setDate(1); start.setHours(0,0,0,0);
  } else {
    return tickets; // alltime
  }
  return tickets.filter(t => new Date(t.created) >= start);
}

function getPrevPeriodTickets(tickets, p) {
  const now = new Date();
  let start, end;
  if (p === 'weekly') {
    end   = new Date(); const day = end.getDay();
    end.setDate(end.getDate() - (day === 0 ? 6 : day - 1));
    end.setHours(0,0,0,0);
    start = new Date(end); start.setDate(start.getDate() - 7);
  } else if (p === 'monthly') {
    end   = new Date(now.getFullYear(), now.getMonth(), 1);
    start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  } else { return []; }
  return tickets.filter(t => { const d = new Date(t.created); return d >= start && d < end; });
}

// ── MAIN RENDER ───────────────────────────────────────────────
function renderReports() {
  const cur  = getTicketsForPeriod(allTickets, period);
  const prev = getPrevPeriodTickets(allTickets, period);
  const label = period === 'weekly' ? 'This Week' : period === 'monthly' ? 'This Month' : 'All Time';
  document.getElementById('reportSub').textContent = label + ' · ' + cur.length + ' tickets · Last updated ' + new Date().toLocaleTimeString('en-ZA', {hour:'2-digit',minute:'2-digit'});

  document.getElementById('mainContent').innerHTML = `
    ${renderSummaryCards(cur, prev)}
    ${renderCharts(cur)}
    ${renderAdminPerformance(cur, prev)}
    ${renderLeaderboard(cur)}
  `;
}

// ── SUMMARY CARDS ─────────────────────────────────────────────
function renderSummaryCards(cur, prev) {
  const total     = cur.length;
  const resolved  = cur.filter(t => t.status === 'resolved').length;
  const open      = cur.filter(t => t.status === 'open').length;
  const inprog    = cur.filter(t => t.status === 'inprogress').length;
  const critical  = cur.filter(t => t.priority === 'critical').length;
  const resRate   = total ? Math.round((resolved/total)*100) : 0;

  const pTotal    = prev.length;
  const pResolved = prev.filter(t => t.status === 'resolved').length;

  const avgResMs  = resolved ? cur.filter(t=>t.resolvedAt).reduce((s,t)=>s+(new Date(t.resolvedAt)-new Date(t.created)),0) / resolved : 0;

  const change = (val, pval) => {
    if (!pval) return `<span class="neutral">— no prev data</span>`;
    const diff = val - pval;
    const pct  = Math.abs(Math.round((diff/pval)*100));
    if (diff > 0) return `<span class="up">▲ ${pct}% vs last period</span>`;
    if (diff < 0) return `<span class="down">▼ ${pct}% vs last period</span>`;
    return `<span class="neutral">= same as last period</span>`;
  };

  return `
  <div class="summary-grid">
    <div class="sum-card" style="--card-color:var(--accent)">
      <div class="sum-icon">🎫</div><div class="sum-num">${total}</div>
      <div class="sum-label">Total Tickets</div>
      <div class="sum-change">${change(total, pTotal)}</div>
    </div>
    <div class="sum-card" style="--card-color:var(--resolved)">
      <div class="sum-icon">✅</div><div class="sum-num">${resolved}</div>
      <div class="sum-label">Resolved</div>
      <div class="sum-change">${change(resolved, pResolved)}</div>
    </div>
    <div class="sum-card" style="--card-color:var(--open)">
      <div class="sum-icon">🔵</div><div class="sum-num">${open}</div>
      <div class="sum-label">Still Open</div>
      <div class="sum-change"><span class="${open > 5 ? 'down' : 'up'}">${open > 5 ? '⚠️ Needs attention' : '✓ Under control'}</span></div>
    </div>
    <div class="sum-card" style="--card-color:var(--medium)">
      <div class="sum-icon">⏱️</div><div class="sum-num">${formatDuration(avgResMs)||'—'}</div>
      <div class="sum-label">Avg Resolution Time</div>
      <div class="sum-change"><span class="neutral">${resolved} resolved tickets</span></div>
    </div>
    <div class="sum-card" style="--card-color:${resRate >= 70 ? 'var(--low)' : resRate >= 40 ? 'var(--medium)' : 'var(--critical)'}">
      <div class="sum-icon">📊</div><div class="sum-num">${resRate}%</div>
      <div class="sum-label">Resolution Rate</div>
      <div class="sum-change"><span class="${resRate >= 70 ? 'up' : resRate >= 40 ? 'neutral' : 'down'}">${resRate >= 70 ? '🟢 Excellent' : resRate >= 40 ? '🟡 Needs improvement' : '🔴 Low — action needed'}</span></div>
    </div>
  </div>`;
}

// ── CHARTS ────────────────────────────────────────────────────
function renderCharts(cur) {
  return `
  <div class="charts-row">
    <div class="chart-card full">
      <div class="chart-title">📈 Ticket Volume Over Time</div>
      <div class="chart-sub">Number of tickets submitted ${period === 'weekly' ? 'each day this week' : period === 'monthly' ? 'each day this month' : 'over the past 12 weeks'}</div>
      <div class="chart-area">${renderLineChart(cur)}</div>
    </div>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">📊 Tickets by Status</div>
      <div class="chart-sub">Breakdown of ticket resolution this period</div>
      <div class="chart-area">${renderBarChart(cur, 'status')}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🎯 Tickets by Priority</div>
      <div class="chart-sub">Distribution of priority levels</div>
      <div class="chart-area">${renderBarChart(cur, 'priority')}</div>
    </div>
  </div>`;
}

function renderLineChart(tickets) {
  const W = 700, H = 180, PAD = { t:10, r:20, b:40, l:40 };
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;

  // Build date buckets
  const now  = new Date();
  let buckets = [];
  if (period === 'weekly') {
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i); d.setHours(0,0,0,0);
      buckets.push({ label: d.toLocaleDateString('en-ZA',{weekday:'short'}), date: d });
    }
  } else if (period === 'monthly') {
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    for (let i = 1; i <= daysInMonth; i++) {
      const d = new Date(now.getFullYear(), now.getMonth(), i);
      buckets.push({ label: i % 5 === 1 ? String(i) : '', date: d });
    }
  } else {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now); d.setDate(1); d.setMonth(d.getMonth() - i);
      buckets.push({ label: d.toLocaleDateString('en-ZA',{month:'short'}), date: d });
    }
  }

  // Count tickets per bucket
  const submitted = buckets.map((b, bi) => {
    const next = buckets[bi+1] ? buckets[bi+1].date : new Date(b.date.getTime() + 86400000);
    return tickets.filter(t => { const d=new Date(t.created); return d>=b.date && d<next; }).length;
  });
  const resolved = buckets.map((b, bi) => {
    const next = buckets[bi+1] ? buckets[bi+1].date : new Date(b.date.getTime() + 86400000);
    return tickets.filter(t => t.resolvedAt && new Date(t.resolvedAt)>=b.date && new Date(t.resolvedAt)<next).length;
  });

  const maxVal = Math.max(...submitted, ...resolved, 1);
  const xStep  = cW / (buckets.length - 1 || 1);

  const pts = (data) => data.map((v, i) => {
    const x = PAD.l + i * xStep;
    const y = PAD.t + cH - (v / maxVal) * cH;
    return `${x},${y}`;
  }).join(' ');

  const linePath = (data, color) => {
    const p = data.map((v,i) => [PAD.l + i*xStep, PAD.t + cH - (v/maxVal)*cH]);
    let d = `M${p[0][0]},${p[0][1]}`;
    for (let i=1;i<p.length;i++) {
      const cpx1 = p[i-1][0] + (p[i][0]-p[i-1][0])*0.4;
      const cpx2 = p[i][0]   - (p[i][0]-p[i-1][0])*0.4;
      d += ` C${cpx1},${p[i-1][1]} ${cpx2},${p[i][1]} ${p[i][0]},${p[i][1]}`;
    }
    return `<path d="${d}" class="line-path" stroke="${color}"/>`;
  };

  const areaPath = (data, color) => {
    const p = data.map((v,i) => [PAD.l + i*xStep, PAD.t + cH - (v/maxVal)*cH]);
    let d = `M${p[0][0]},${PAD.t+cH}`;
    d += ` L${p[0][0]},${p[0][1]}`;
    for (let i=1;i<p.length;i++) {
      const cpx1 = p[i-1][0]+(p[i][0]-p[i-1][0])*0.4;
      const cpx2 = p[i][0]-(p[i][0]-p[i-1][0])*0.4;
      d += ` C${cpx1},${p[i-1][1]} ${cpx2},${p[i][1]} ${p[i][0]},${p[i][1]}`;
    }
    d += ` L${p[p.length-1][0]},${PAD.t+cH} Z`;
    return `<path d="${d}" fill="${color}" class="area-path"/>`;
  };

  const gridLines = Array.from({length:5},(_,i)=>{
    const y = PAD.t + (cH/4)*i;
    const val = Math.round(maxVal - (maxVal/4)*i);
    return `<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" class="grid-line"/>
            <text x="${PAD.l-6}" y="${y+4}" class="axis-label" text-anchor="end">${val}</text>`;
  }).join('');

  const xLabels = buckets.map((b,i)=> b.label ?
    `<text x="${PAD.l+i*xStep}" y="${H-6}" class="axis-label" text-anchor="middle">${b.label}</text>` : ''
  ).join('');

  const dots = (data, color) => data.map((v,i) =>
    `<circle cx="${PAD.l+i*xStep}" cy="${PAD.t+cH-(v/maxVal)*cH}" class="line-dot" fill="${color}"/>`
  ).join('');

  return `
  <svg viewBox="0 0 ${W} ${H}" class="chart-svg">
    ${gridLines}
    ${areaPath(submitted, '#0ea5e9')}
    ${areaPath(resolved, '#22c55e')}
    ${linePath(submitted, '#0ea5e9')}
    ${linePath(resolved, '#22c55e')}
    ${dots(submitted, '#0ea5e9')}
    ${dots(resolved, '#22c55e')}
    ${xLabels}
    <!-- Legend -->
    <circle cx="${W-160}" cy="18" r="5" fill="#0ea5e9"/>
    <text x="${W-152}" y="22" class="axis-label" style="font-size:11px">Submitted</text>
    <circle cx="${W-80}" cy="18" r="5" fill="#22c55e"/>
    <text x="${W-72}" y="22" class="axis-label" style="font-size:11px">Resolved</text>
  </svg>`;
}

function renderBarChart(tickets, groupBy) {
  const isStatus = groupBy === 'status';

  let groups;
  if (isStatus) {
    groups = [
      { key:'open',       label:'Open',       color:'#0ea5e9', emoji:'🔵', desc:'Awaiting action' },
      { key:'inprogress', label:'In Progress', color:'#a855f7', emoji:'🟣', desc:'Currently being worked on' },
      { key:'resolved',   label:'Resolved',   color:'#22c55e', emoji:'🟢', desc:'Issue fixed & closed' },
    ];
  } else {
    groups = [
      { key:'low',      label:'Low',      color:'#22c55e', emoji:'🟢', desc:'Non-urgent, can wait' },
      { key:'medium',   label:'Medium',   color:'#f59e0b', emoji:'🟡', desc:'Needs attention soon' },
      { key:'high',     label:'High',     color:'#f97316', emoji:'🟠', desc:'Important, act quickly' },
      { key:'critical', label:'Critical', color:'#ef4444', emoji:'🔴', desc:'Urgent, stop everything' },
    ];
  }

  const counts = groups.map(g => tickets.filter(t => t[groupBy] === g.key).length);
  const total  = counts.reduce((a,b) => a+b, 0) || 1;
  const maxVal = Math.max(...counts, 1);

  const title   = isStatus ? '📊 Tickets by Status' : '🎯 Tickets by Priority';
  const explain = isStatus
    ? 'Shows how many tickets are waiting, in progress, or done. A healthy helpdesk has most tickets in <strong style="color:#22c55e">Resolved</strong>.'
    : 'Shows the urgency of open tickets. Watch out for too many <strong style="color:#ef4444">Critical</strong> or <strong style="color:#f97316">High</strong> tickets.';

  // SVG bar chart — wider, taller, more readable
  const W = 400, H = 200, PAD = { t:30, r:16, b:24, l:36 };
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;
  const barW   = Math.floor(cW / groups.length * 0.55);
  const spacing= cW / groups.length;

  const gridLines = Array.from({length:5}, (_,i) => {
    const y   = PAD.t + (cH/4)*i;
    const val = Math.round(maxVal - (maxVal/4)*i);
    return `<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke-dasharray="4,4" stroke="var(--border,#dde3ec)" stroke-width="1"/>
            <text x="${PAD.l-5}" y="${y+4}" text-anchor="end" font-family="Fira Code,monospace" font-size="9" fill="var(--muted,#8a96a8)">${val}</text>`;
  }).join('');

  const bars = groups.map((g, i) => {
    const cx  = PAD.l + spacing * i + spacing / 2;
    const x   = cx - barW / 2;
    const h   = Math.max((counts[i] / maxVal) * cH, counts[i] > 0 ? 6 : 0);
    const y   = PAD.t + cH - h;
    const pct = Math.round((counts[i] / total) * 100);
    return `
      <g class="bar-group">
        <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="6"
              fill="${g.color}" opacity="0.9"/>
        <rect x="${x}" y="${y}" width="${barW}" height="${Math.min(h,8)}" rx="6"
              fill="${g.color}"/>
        <text x="${cx}" y="${y - 6}" text-anchor="middle"
              font-family="Fira Code,monospace" font-size="11" font-weight="700"
              fill="${g.color}">${counts[i]}</text>
        <text x="${cx}" y="${H - 8}" text-anchor="middle"
              font-family="Bricolage Grotesque,sans-serif" font-size="9" font-weight="600"
              fill="var(--muted,#8a96a8)">${pct}%</text>
      </g>`;
  }).join('');

  // Colour legend rows (HTML, not SVG — much more readable)
  const legendRows = groups.map((g, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
                border-radius:8px;background:color-mix(in srgb,${g.color} 8%,transparent);
                border:1px solid color-mix(in srgb,${g.color} 22%,transparent)">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:12px;height:12px;border-radius:3px;background:${g.color};flex-shrink:0"></div>
        <div>
          <span style="font-weight:700;font-size:13px">${g.emoji} ${g.label}</span>
          <span style="color:var(--muted);font-size:11px;margin-left:8px">${g.desc}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span style="font-family:Fira Code,monospace;font-weight:700;font-size:14px;color:${g.color}">${counts[i]}</span>
        <span style="font-size:11px;color:var(--muted);font-family:Fira Code,monospace">${Math.round((counts[i]/total)*100)}%</span>
      </div>
    </div>`).join('');

  return `
    <div style="margin-bottom:4px">
      <div style="font-size:14px;font-weight:800;letter-spacing:-0.01em">${title}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5">${explain}</div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible;margin:12px 0 4px">
      ${gridLines}${bars}
    </svg>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">${legendRows}</div>`;
}

// ── ADMIN PERFORMANCE ─────────────────────────────────────────
function renderAdminPerformance(cur, prev) {
  const cards = ADMINS.map(admin => {
    const mine    = cur.filter(t => t.assignee === admin.name);
    const total   = mine.length;
    const resolved= mine.filter(t => t.status === 'resolved').length;
    const open    = mine.filter(t => t.status === 'open').length;
    const inprog  = mine.filter(t => t.status === 'inprogress').length;
    const rate    = total ? Math.round((resolved/total)*100) : 0;
    const avgMs   = resolved ? mine.filter(t=>t.resolvedAt).reduce((s,t)=>s+(new Date(t.resolvedAt)-new Date(t.created)),0)/resolved : 0;

    // Previous period
    const prevMine = prev.filter(t => t.assignee === admin.name);
    const prevRate = prevMine.length ? Math.round((prevMine.filter(t=>t.status==='resolved').length/prevMine.length)*100) : null;

    // Verdict
    let verdict, vClass;
    if (rate >= 80)      { verdict = '🌟 Excellent performance'; vClass = 'verdict-great'; }
    else if (rate >= 60) { verdict = '✅ Good performance';      vClass = 'verdict-good'; }
    else if (rate >= 30) { verdict = '⚠️ Needs improvement';    vClass = 'verdict-ok'; }
    else if (total === 0){ verdict = '— No tickets this period'; vClass = 'verdict-ok'; }
    else                 { verdict = '🔴 Low resolution rate';  vClass = 'verdict-low'; }

    const trendHtml = prevRate !== null
      ? `<span style="font-size:11px;font-family:var(--font-mono);color:${rate>=prevRate?'var(--low)':'var(--critical)'}">${rate>=prevRate?'▲':'▼'} ${Math.abs(rate-prevRate)}% vs last period</span>`
      : '';

    // Mini bar chart SVG
    const barData  = [
      { label:'Open',    val:open,     color:'#0ea5e9' },
      { label:'In Prog', val:inprog,   color:'#a855f7' },
      { label:'Resolved',val:resolved, color:'#22c55e' },
    ];
    const bMax = Math.max(...barData.map(b=>b.val), 1);
    const barSvg = `<svg viewBox="0 0 220 60" style="width:100%;margin-top:10px">
      ${barData.map((b,i)=>{
        const bw=50, gap=10, x=10+i*(bw+gap), h=Math.max((b.val/bMax)*40,b.val>0?3:0), y=50-h;
        return `<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="4" fill="${b.color}" opacity="0.85"/>
                <text x="${x+bw/2}" y="58" font-size="9" text-anchor="middle" fill="var(--muted)" font-family="Fira Code">${b.label}</text>
                <text x="${x+bw/2}" y="${y-3}" font-size="10" text-anchor="middle" fill="${b.color}" font-weight="700">${b.val}</text>`;
      }).join('')}
    </svg>`;

    return `
    <div class="admin-perf-card" style="--admin-color:${admin.color}">
      <div class="admin-perf-header">
        <div class="admin-avatar" style="background:${admin.color}">${admin.avatar}</div>
        <div>
          <div class="admin-perf-name">${admin.emoji} ${admin.name}</div>
          <div class="admin-perf-dept">${admin.department} Admin</div>
          ${trendHtml}
        </div>
      </div>
      <div class="perf-stats">
        <div class="perf-stat">
          <div class="perf-stat-num" style="color:${admin.color}">${total}</div>
          <div class="perf-stat-label">Assigned</div>
        </div>
        <div class="perf-stat">
          <div class="perf-stat-num" style="color:var(--low)">${resolved}</div>
          <div class="perf-stat-label">Resolved</div>
        </div>
        <div class="perf-stat">
          <div class="perf-stat-num" style="color:var(--open)">${open}</div>
          <div class="perf-stat-label">Still Open</div>
        </div>
        <div class="perf-stat">
          <div class="perf-stat-num" style="color:var(--medium);font-size:16px">${formatDuration(avgMs)||'—'}</div>
          <div class="perf-stat-label">Avg. Resolve</div>
        </div>
      </div>
      <div class="perf-rate-wrap">
        <div class="perf-rate-label">
          <span>Resolution Rate</span>
          <span style="color:${rate>=70?'var(--low)':rate>=40?'var(--medium)':'var(--critical)'}">${rate}%</span>
        </div>
        <div class="perf-bar-track">
          <div class="perf-bar-fill" style="width:${rate}%;background:${rate>=70?'var(--low)':rate>=40?'var(--medium)':'var(--critical)'}"></div>
        </div>
      </div>
      ${barSvg}
      <div class="perf-verdict ${vClass}" style="margin-top:12px">${verdict}</div>
    </div>`;
  }).join('');

  return `
  <div>
    <div class="section-heading">
      <div>
        <div class="section-title">👥 Admin Performance</div>
        <div class="section-sub">Individual breakdown — who resolved what and how fast</div>
      </div>
    </div>
    <div style="margin-top:14px" class="admin-perf-grid">${cards}</div>
  </div>`;
}

// ── LEADERBOARD ───────────────────────────────────────────────
function renderLeaderboard(cur) {
  const medals = ['🥇','🥈','🥉'];

  const rows = ADMINS.map(admin => {
    const mine     = cur.filter(t => t.assignee === admin.name);
    const resolved = mine.filter(t => t.status === 'resolved').length;
    const total    = mine.length;
    const rate     = total ? Math.round((resolved/total)*100) : 0;
    const avgMs    = resolved ? mine.filter(t=>t.resolvedAt).reduce((s,t)=>s+(new Date(t.resolvedAt)-new Date(t.created)),0)/resolved : Infinity;
    return { admin, resolved, total, rate, avgMs };
  }).sort((a,b) => b.rate - a.rate || b.resolved - a.resolved);

  const rateColor = r => r >= 70 ? '#22c55e' : r >= 40 ? '#f59e0b' : '#ef4444';
  const rateBg    = r => r >= 70 ? 'rgba(34,197,94,0.1)' : r >= 40 ? 'rgba(245,158,11,0.1)' : 'rgba(239,68,68,0.1)';

  const tableRows = rows.map((r,i) => `
    <tr>
      <td class="rank-medal">${medals[i] || ''}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:30px;height:30px;border-radius:50%;background:${r.admin.color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff">${r.admin.avatar}</div>
          <div>
            <div style="font-weight:700">${r.admin.emoji} ${r.admin.name}</div>
            <div style="font-size:11px;color:var(--muted)">${r.admin.department}</div>
          </div>
        </div>
      </td>
      <td style="font-family:var(--font-mono);font-weight:700;color:${r.admin.color}">${r.total}</td>
      <td style="font-family:var(--font-mono);font-weight:700;color:var(--low)">${r.resolved}</td>
      <td style="font-family:var(--font-mono)">${r.avgMs === Infinity ? '—' : formatDuration(r.avgMs)}</td>
      <td>
        <span class="rate-pill" style="background:${rateBg(r.rate)};color:${rateColor(r.rate)};border:1px solid ${rateColor(r.rate)}44">
          ${r.rate}%
        </span>
      </td>
      <td style="font-size:12px;color:${rateColor(r.rate)};font-weight:600">
        ${r.rate >= 70 ? '🌟 Excellent' : r.rate >= 40 ? '✅ Good' : r.total === 0 ? '— No tickets' : '⚠️ Needs work'}
      </td>
    </tr>`).join('');

  return `
  <div>
    <div class="section-heading">
      <div>
        <div class="section-title">🏆 Admin Leaderboard</div>
        <div class="section-sub">Ranked by resolution rate — see who is keeping the team stats up</div>
      </div>
    </div>
    <div style="margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)">
      <table class="rank-table" style="width:100%">
        <thead>
          <tr>
            <th></th>
            <th>Admin</th>
            <th>Assigned</th>
            <th>Resolved</th>
            <th>Avg Time</th>
            <th>Rate</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>`;
}
</script>
